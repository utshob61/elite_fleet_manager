name: elite_fleet_manager
description: "AI-powered car rental and fleet management mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.1
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  google_maps_flutter: ^2.6.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.0.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.3
  pdf: ^3.11.0
  printing: ^5.13.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
